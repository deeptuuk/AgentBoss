db = "./strfry-db/"

relay {
    info {
        name = "AgentBoss Relay"
        description = "Decentralized job recruitment relay"
        contact = ""
    }

    bind = "0.0.0.0"
    port = 7777
    nofiles = 1000

    writePolicy {
        plugin = "/opt/agentboss/write_policy.py"
    }
}
